<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Billing App</title>
    <style>
        /* Form Styling (Visible only on Screen, Hidden during Printing) */
        #input-form-section {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 25px;
            background: #fdfdfd;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2, h3 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 6px;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fbfbfb;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
        }
        
        /* Items Row Container Styles */
        .items-header {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr 1fr 1.2fr;
            gap: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
            color: #2c3e50;
            text-transform: uppercase;
        }
        .item-row-input {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr 1fr 1.2fr;
            gap: 15px;
            margin-bottom: 12px;
        }
        .item-row-input input {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            cursor: pointer;
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background-color: #27ae60; }
        .btn-add { background-color: #3498db; margin-top: 10px; }
        .btn-add:hover { background-color: #2980b9; }
        .btn-print {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #e67e22;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-print:hover { background-color: #d35400; }

        /* ==================== PRINT STYLING ==================== */
        #printable-invoice-container {
            display: none;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0; 
            }
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                overflow: hidden;
            }
            body {
                padding: 10mm 12mm; 
                font-family: 'Times New Roman', Times, serif, Arial;
                color: #000;
                background: #fff;
            }
            #input-form-section {
                display: none !important;
            }
            #printable-invoice-container {
                display: block !important;
                height: 100%;
                box-sizing: border-box;
            }
            
            .print-invoice-title {
                text-align: center;
                text-decoration: underline;
                font-size: 26px;
                font-weight: normal;
                letter-spacing: 1px;
                margin-bottom: 12px;
                height: 40px;
            }

            /* Standard Native Table Layout - Pixel-Perfect Uniform Gridlines */
            table.invoice-table {
                width: 100%;
                height: calc(100% - 60px); /* Clean vertical containment */
                border-collapse: collapse;
                table-layout: fixed; 
                border: 1px solid #000 !important;
            }

            /* Every single line is exactly 1px solid black */
            table.invoice-table td, table.invoice-table th {
                border: 1px solid #000 !important;
                padding: 8px 10px;
                font-size: 15.5px;
                word-wrap: break-word;
                vertical-align: top;
                box-sizing: border-box;
                background-color: transparent !important;
            }

            .bold { font-weight: bold !important; }
            .normal { font-weight: normal !important; }
            .center { text-align: center; }
            .right { text-align: right; }
            
            .nowrap {
                white-space: nowrap !important;
            }

            .sender-title {
                font-size: 22px; 
                font-weight: normal; 
                display: block;
                margin-bottom: 4px;
                line-height: 1.2;
            }
            .buyer-title {
                font-size: 19px; 
                font-weight: normal; 
                display: block;
                margin-bottom: 4px;
                line-height: 1.2;
            }
            .address-block {
                font-size: 14.5px; 
                line-height: 1.4;
                display: block;
                margin-bottom: 4px;
            }
            .sender-gst-text {
                font-size: 15.5px; 
                font-weight: normal; 
                display: block;
            }
            .buyer-gst-text {
                font-size: 15.5px;
                font-weight: normal; 
                display: block;
            }

            table.invoice-table th {
                font-weight: normal !important; 
                text-align: center;
                vertical-align: middle;
                font-size: 15.5px;
            }

            /* Native spacer row uses table layout auto-stretch mechanics */
            .dynamic-spacer-row {
                height: 100%;
            }
            .dynamic-spacer-row td {
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- SECTION 1: Form Inputs (Hidden during Print) -->
    <div id="input-form-section">
        <h2>GST Tax Invoice Details Generator</h2>
        
        <h3>1. Buyer Details (Billed To)</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Buyer Company Name</label>
                <input type="text" id="buyer-name" placeholder="Enter Buyer Company Name">
            </div>
            <div class="form-group">
                <label>Buyer Address</label>
                <input type="text" id="buyer-address" placeholder="Enter Full Address of Buyer">
            </div>
            <div class="form-group">
                <label>Buyer GSTIN</label>
                <input type="text" id="buyer-gst" placeholder="Enter Buyer 15-digit GSTIN">
            </div>
        </div>

        <h3>2. Invoice Tracking Details</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Invoice Serial No.</label>
                <input type="number" id="serial-no" placeholder="Enter Invoice Number">
            </div>
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="invoice-date">
            </div>
            <div class="form-group">
                <label>Date of Delivery of Goods</label>
                <input type="date" id="delivery-date">
            </div>
            <div class="form-group">
                <label>Delivery Challan No.</label>
                <input type="number" id="challan-no" placeholder="Enter Challan Number">
            </div>
        </div>

        <h3>3. Product/Item Entries</h3>
        <div class="items-header">
            <div>HSN Code</div>
            <div>Description of Goods</div>
            <div>Qty</div>
            <div>Units</div>
            <div>Rate per Unit (Rs.)</div>
        </div>
        <div id="items-container">
            <div class="item-row-input">
                <input type="number" placeholder="HSN Code" class="item-hsn">
                <input type="text" placeholder="Description of Goods" class="item-desc">
                <input type="number" placeholder="Qty" class="item-qty">
                <input type="text" placeholder="Unit" class="item-unit">
                <input type="number" step="0.01" placeholder="Rate" class="item-rate">
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addNewItemRow()">+ Add Another Item</button>

        <h3>4. Financial & Taxes</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Tax Structure System</label>
                <select id="tax-type" onchange="toggleTaxFields()">
                    <option value="CGST/SGST">CGST & SGST (Intra-State)</option>
                    <option value="IGST">IGST (Inter-State)</option>
                </select>
            </div>
            <div class="form-group" id="cgst-sgst-inputs">
                <label>CGST (%) & SGST (%)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="cgst-percent" placeholder="CGST %">
                    <input type="number" id="sgst-percent" placeholder="SGST %">
                </div>
            </div>
            <div class="form-group" id="igst-input" style="display:none;">
                <label>IGST (%)</label>
                <input type="number" id="igst-percent" placeholder="IGST %">
            </div>
        </div>

        <button type="button" class="btn-print" onclick="generateAndPrint()">Generate & Print Invoice</button>
    </div>

    <!-- SECTION 2: Clean Printable Bill Layout (Visible only when Printing) -->
    <div id="printable-invoice-container">
        <div class="print-invoice-title">TAX INVOICE</div>
        <table class="invoice-table" id="master-table">
            <!-- Colgroup forces exact columns layout across all browsers -->
            <colgroup>
                <col style="width: 7%;">
                <col style="width: 11%;">
                <col style="width: 38%;">
                <col style="width: 11%;">
                <col style="width: 9%;">
                <col style="width: 11%;">
                <col style="width: 13%;">
            </colgroup>
            <tbody id="master-tbody">
                <!-- Dynamic content injected here -->
            </tbody>
        </table>
    </div>

    <script>
        function toggleTaxFields() {
            const taxType = document.getElementById('tax-type').value;
            if(taxType === 'IGST') {
                document.getElementById('igst-input').style.display = 'block';
                document.getElementById('cgst-sgst-inputs').style.display = 'none';
            } else {
                document.getElementById('igst-input').style.display = 'none';
                document.getElementById('cgst-sgst-inputs').style.display = 'block';
            }
        }

        function addNewItemRow() {
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'item-row-input';
            newRow.innerHTML = `
                <input type="number" placeholder="HSN Code" class="item-hsn">
                <input type="text" placeholder="Description of Goods" class="item-desc">
                <input type="number" placeholder="Qty" class="item-qty">
                <input type="text" placeholder="Unit" class="item-unit">
                <input type="number" step="0.01" placeholder="Rate" class="item-rate">
            `;
            container.appendChild(newRow);
        }

        function numberToWords(num) {
            if (num === 0) return "Zero";
            const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", 
                          "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
            const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

            function convertBelowThousand(n) {
                let res = "";
                if (n >= 100) {
                    res += ones[Math.floor(n / 100)] + " Hundred ";
                    n %= 100;
                }
                if (n >= 20) {
                    res += tens[Math.floor(n / 10)] + " ";
                    n %= 10;
                }
                if (n > 0) {
                    res += ones[n] + " ";
                }
                return res;
            }

            let result = "";
            if (num >= 100000) {
                result += convertBelowThousand(Math.floor(num / 100000)) + "Lakh ";
                num %= 100000;
            }
            if (num >= 1000) {
                result += convertBelowThousand(Math.floor(num / 1000)) + "Thousand ";
                num %= 1000;
            }
            result += convertBelowThousand(num);
            return result.trim() + " Rupees Only";
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            const rawYear = d.getFullYear().toString();
            const year = rawYear.length > 4 ? rawYear.slice(-4) : rawYear; 
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${year}`;
        }

        function generateAndPrint() {
            // ====== UPDATE YOUR COMPANY DETAILS HERE ======
            const seller = {
                name: "YOUR COMPANY NAME LTD",
                addr: "123, Business Park, Industrial Area, Phase-1, New Delhi - 110001",
                gst: "07AAAAA0000A1Z5"
            };

            // ====== UPDATE YOUR BANK DETAILS HERE ======
            const bank = {
                name: "STATE BANK OF INDIA",
                ac: "123456789012",
                ifsc: "SBIN0001234"
            };

            // Capturing variable user inputs
            const buyer = {
                name: document.getElementById('buyer-name').value,
                addr: document.getElementById('buyer-address').value,
                gst: document.getElementById('buyer-gst').value
            };
            const meta = {
                serial: document.getElementById('serial-no').value,
                date: formatDate(document.getElementById('invoice-date').value),
                delivDate: formatDate(document.getElementById('delivery-date').value),
                challan: document.getElementById('challan-no').value
            };

            const itemRows = document.getElementsByClassName('item-row-input');
            let items = [];
            let totalBeforeTax = 0;

            for (let i = 0; i < itemRows.length; i++) {
                const inputs = itemRows[i].getElementsByTagName('input');
                const hsn = inputs[0].value;
                const desc = inputs[1].value;
                const qty = parseInt(inputs[2].value) || 0;
                const unit = inputs[3].value;
                const rate = parseFloat(inputs[4].value) || 0;
                
                if (!desc) continue;

                const amt = parseFloat((qty * rate).toFixed(2));
                totalBeforeTax += amt;

                items.push({
                    sl: items.length + 1,
                    hsn: hsn,
                    desc: desc,
                    qty: qty,
                    unit: unit,
                    rate: rate,
                    amt: amt
                });
            }

            const taxType = document.getElementById('tax-type').value;
            let taxHTML = "";
            let grandTotal = totalBeforeTax;

            if (taxType === "IGST") {
                const igstP = parseInt(document.getElementById('igst-percent').value) || 0;
                const igstAmt = parseFloat((totalBeforeTax * (igstP / 100)).toFixed(2));
                grandTotal += igstAmt;
                
                taxHTML = `
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="right">IGST ${igstP}%:</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="right nowrap">${igstAmt.toFixed(2)}</td>
                    </tr>
                `;
            } else {
                const cgstP = parseInt(document.getElementById('cgst-percent').value) || 0;
                const sgstP = parseInt(document.getElementById('sgst-percent').value) || 0;
                const cgstAmt = parseFloat((totalBeforeTax * (cgstP / 100)).toFixed(2));
                const sgstAmt = parseFloat((totalBeforeTax * (sgstP / 100)).toFixed(2));
                grandTotal += (cgstAmt + sgstAmt);
                
                taxHTML = `
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="right">CGST ${cgstP}%:</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="right nowrap">${cgstAmt.toFixed(2)}</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="right">SGST ${sgstP}%:</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="right nowrap">${sgstAmt.toFixed(2)}</td>
                    </tr>
                `;
            }

            grandTotal = Math.round(grandTotal);
            const totalWords = numberToWords(grandTotal);

            // Construction of table structure utilizing standard HTML colspan attributes
            let tableHTML = `
                <!-- Row 1: Seller Details -->
                <tr>
                    <td colspan="4" style="font-weight: normal;">
                        <span class="sender-title">${seller.name}</span>
                        <span class="address-block">${seller.addr}</span>
                        <span class="sender-gst-text">GSTIN: <span class="bold">${seller.gst}</span></span>
                    </td>
                    <td colspan="3" style="font-weight: normal;">
                        <span class="normal">Serial No:</span> ${meta.serial}<br>
                        <span class="normal">Date:</span> ${meta.date}
                    </td>
                </tr>
                <!-- Row 2: Buyer Details -->
                <tr>
                    <td colspan="4" style="font-weight: normal;">
                        <span class="buyer-title">${buyer.name}</span>
                        <span class="address-block">${buyer.addr}</span>
                        <span class="buyer-gst-text">GSTIN: ${buyer.gst}</span>
                    </td>
                    <td colspan="3" style="font-weight: normal;">
                        <span class="normal">Date of Delivery of Goods:</span><br>${meta.delivDate}<br><br>
                        <span class="normal">Delivery Challan No:</span> ${meta.challan}
                    </td>
                </tr>

                <!-- Row 3: Column Headers (Unspanned base layer) -->
                <tr>
                    <th>Sl No.</th>
                    <th>HSN</th>
                    <th>Description of Goods</th>
                    <th>Qty</th>
                    <th>Units</th>
                    <th>Rate (Rs.)</th>
                    <th>Amount (Rs.)</th>
                </tr>
            `;

            // Active Item Rows
            items.forEach(item => {
                tableHTML += `
                    <tr>
                        <td class="center">${item.sl}</td>
                        <td class="center">${item.hsn}</td>
                        <td>${item.desc}</td>
                        <td class="center">${item.qty}</td>
                        <td class="center">${item.unit}</td>
                        <td class="right nowrap">${item.rate.toFixed(2)}</td>
                        <td class="right nowrap">${item.amt.toFixed(2)}</td>
                    </tr>
                `;
            });

            // Native Dynamic Spacer Row stretching table height
            tableHTML += `
                <tr class="dynamic-spacer-row">
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            `;

            // Bank Details Section
            tableHTML += `
                <tr>
                    <td></td>
                    <td></td>
                    <td style="font-weight: normal;">
                        <span class="bold">BANK DETAILS:</span><br>
                        Bank Name: ${bank.name}<br>
                        <span class="bold">A/c No: ${bank.ac}</span><br>
                        <span class="bold">IFSC Code: ${bank.ifsc}</span>
                    </td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            `;

            // Financial Summary Section
            tableHTML += `
                <tr>
                    <td></td>
                    <td></td>
                    <td class="right">Total before Tax:</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="right nowrap">${totalBeforeTax.toFixed(2)}</td>
                </tr>
                ${taxHTML}
                <tr>
                    <td></td>
                    <td></td>
                    <td class="right">Grand Total:</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="right nowrap">${grandTotal.toFixed(2)}</td>
                </tr>
                <tr>
                    <td colspan="7" style="padding: 10px 12px; font-weight: normal;">
                        Total Amount in Words: ${totalWords}
                    </td>
                </tr>
                <!-- Bottom signature block -->
                <tr>
                    <td colspan="7" style="padding: 15px; height: 110px; text-align: right; vertical-align: bottom; font-weight: normal;">
                        <div style="display: inline-block; text-align: left;">
                            <div>For ${seller.name}</div>
                            <div style="margin-top: 55px; font-weight: bold;">Authorized Signatory</div>
                        </div>
                    </td>
                </tr>
            `;

            document.getElementById('master-tbody').innerHTML = tableHTML;
            window.print();
        }
    </script>
</body>
</html>
