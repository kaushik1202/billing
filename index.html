<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Billing App</title>
    <style>
        /* Global Reset for Accurate Box Model Across All Mobile Screen Sizes */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
        }

        /* Form Styling (Visible only on Screen, Hidden during Printing) */
        #input-form-section {
            max-width: 900px;
            margin: 15px auto;
            padding: 20px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2, h3 { 
            color: #2c3e50; 
            margin-top: 0; 
            border-bottom: 2px solid #ecf0f1; 
            padding-bottom: 8px; 
            font-weight: 600; 
        }

        h3 {
            font-size: 16px;
            margin-top: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            margin-bottom: 6px;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            padding: 10px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fbfbfb;
            width: 100%;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
        }
        
        /* Items Row Container Styles */
        .items-header {
            display: grid;
            grid-template-columns: 3.5fr 1fr 1fr 1.2fr;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #2c3e50;
            text-transform: uppercase;
            font-weight: bold;
        }

        .item-row-input {
            display: grid;
            grid-template-columns: 3.5fr 1fr 1fr 1.2fr;
            gap: 10px;
            margin-bottom: 12px;
            background: #fafafa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .item-row-input input {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }
        
        button {
            cursor: pointer;
            padding: 12px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
            width: auto;
        }

        button:hover { background-color: #27ae60; }

        .btn-add { 
            background-color: #3498db; 
            margin-top: 5px; 
            width: 100%;
        }

        .btn-add:hover { background-color: #2980b9; }

        .btn-print {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            background-color: #e67e22;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-print:hover { background-color: #d35400; }

        /* Mobile Responsiveness Improvements */
        @media screen and (max-width: 768px) {
            #input-form-section {
                margin: 10px;
                padding: 15px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .items-header {
                display: none; /* Hide multi-column header on phones */
            }

            .item-row-input {
                grid-template-columns: 1fr 1fr; /* Stack into 2x2 grid on mobile */
                gap: 8px;
            }

            .item-row-input .item-desc {
                grid-column: span 2; /* Full width for item description */
            }
        }

        /* ==================== PRINT STYLING ==================== */
        #printable-invoice-container {
            display: none;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0; 
            }
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #fff;
            }
            body {
                padding: 10mm 12mm; 
                font-family: 'Times New Roman', Times, serif, Arial;
                color: #000;
                font-weight: normal !important;
            }
            #input-form-section {
                display: none !important;
            }
            #printable-invoice-container {
                display: flex !important;
                flex-direction: column;
                height: 100%;
                justify-content: space-between;
            }
            
            .print-invoice-title {
                text-align: center;
                font-size: 24px;
                font-weight: normal;
                letter-spacing: 1px;
                margin-bottom: 12px;
                flex-shrink: 0;
            }

            /* Unified Standard Table with Consistent 1px Borders */
            table.invoice-table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed; 
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                border: 1px solid #000;
            }

            table.invoice-table tbody {
                display: flex;
                flex-direction: column;
                height: 100%;
                width: 100%;
            }

            table.invoice-table tr {
                display: flex;
                width: 100%;
                flex-shrink: 0;
            }

            table.invoice-table td, table.invoice-table th {
                border: 1px solid #000;
                padding: 6px 8px;
                font-size: 16px;
                word-wrap: break-word;
                vertical-align: top;
                font-weight: normal;
            }

            /* Column Widths */
            .col-1 { width: 9%; }
            .col-2 { width: 44%; }
            .col-3 { width: 9%; }
            .col-4 { width: 9%; }
            .col-5 { width: 12%; }
            .col-6 { width: 17%; }

            .col-span-4 { width: 62%; }
            .col-span-2 { width: 38%; }
            .col-span-6 { width: 100%; }

            .party-cell {
                min-height: 120px;
            }

            .seller-gst-bold { 
                font-weight: bold !important;
            }
            .normal { font-weight: normal !important; }
            .center { text-align: center; }
            .right { text-align: right; }
            .nowrap { white-space: nowrap !important; }

            .sender-title {
                font-size: 22px !important;
                display: block;
                margin-bottom: 3px;
                line-height: 1.1;
            }
            .buyer-title {
                font-size: 19px;
                display: block;
                margin-bottom: 3px;
            }
            .address-block {
                font-size: 16px;
                line-height: 1.3;
                display: block;
                margin-bottom: 3px;
            }
            .sender-gst-text, .buyer-gst-text {
                font-size: 16px;
                display: block;
            }

            table.invoice-table th {
                font-weight: normal; 
                text-align: center;
                vertical-align: middle;
                font-size: 16.5px;
                white-space: nowrap !important;
            }

            .dynamic-spacer-row {
                flex-grow: 1 !important;
                flex-shrink: 1 !important;
                height: auto !important;
            }
            .dynamic-spacer-row td {
                height: 100%;
                border-top: none;
                border-bottom: none;
            }

            .signature-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                margin-left: auto;
                width: fit-content;
                min-width: 240px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- SECTION 1: Form Inputs (Receiver / Buyer Details Only) -->
    <div id="input-form-section">
        <h2>GST Tax Invoice Generator</h2>
        
        <h3>1. Bill To (Receiver Details)</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Buyer Company Name</label>
                <input type="text" id="buyer-name" placeholder="Enter Receiver/Buyer Company Name">
            </div>
            <div class="form-group">
                <label>Buyer Address</label>
                <input type="text" id="buyer-address" placeholder="Enter Full Address of Receiver">
            </div>
            <div class="form-group">
                <label>Buyer GSTIN (Optional)</label>
                <input type="text" id="buyer-gst" placeholder="Enter Buyer 15-digit GSTIN">
            </div>
        </div>

        <h3>2. Invoice Tracking Details</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Seri No.</label>
                <input type="number" id="serial-no" placeholder="Enter Invoice Number">
            </div>
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="invoice-date">
            </div>
            <div class="form-group">
                <label>Date of Delivery of Goods</label>
                <input type="date" id="delivery-date">
            </div>
            <div class="form-group">
                <label>Delivery Challan No.</label>
                <input type="number" id="challan-no" placeholder="Enter Challan Number">
            </div>
        </div>

        <h3>3. Product/Item Entries</h3>
        <div class="items-header">
            <div>Description</div>
            <div>Qty.</div>
            <div>Unit</div>
            <div>Rate per Unit (Rs.)</div>
        </div>
        <div id="items-container">
            <div class="item-row-input">
                <input type="text" placeholder="Description" class="item-desc">
                <input type="number" placeholder="Qty." class="item-qty">
                <input type="text" placeholder="Unit" class="item-unit">
                <input type="number" step="0.01" placeholder="Rate" class="item-rate">
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addNewItemRow()">+ Add Another Item</button>

        <h3>4. Taxes</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Tax Structure System</label>
                <select id="tax-type" onchange="toggleTaxFields()">
                    <option value="CGST/SGST">CGST & SGST (Intra-State)</option>
                    <option value="IGST">IGST (Inter-State)</option>
                </select>
            </div>
            <div class="form-group" id="cgst-sgst-inputs">
                <label>SGST (%) & CGST (%)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="sgst-percent" placeholder="SGST %">
                    <input type="number" id="cgst-percent" placeholder="CGST %">
                </div>
            </div>
            <div class="form-group" id="igst-input" style="display:none;">
                <label>IGST (%)</label>
                <input type="number" id="igst-percent" placeholder="IGST %">
            </div>
        </div>

        <button type="button" class="btn-print" onclick="generateAndPrint()">Generate & Print Invoice</button>
    </div>

    <!-- SECTION 2: Printable Invoice Layout -->
    <div id="printable-invoice-container">
        <div class="print-invoice-title">TAX INVOICE</div>
        <table class="invoice-table" id="master-table">
            <!-- Dynamic content injected here -->
        </table>
    </div>

    <script>
        // PERMANENT SENDER / SELLER COMPANY DETAILS
        const SELLER_DETAILS = {
            name: "SREE VIJAYA SAI KRISHNA ENGINEERS",
            address: "Flat No. 108, A-Block, West Metro, Chandanagar, Rangareddy District, Hyderabad - 500050, Telangana, India",
            gstin: "GST No: 36AAFTS3307R1ZY"
        };

        function toggleTaxFields() {
            const taxType = document.getElementById('tax-type').value;
            if(taxType === 'IGST') {
                document.getElementById('igst-input').style.display = 'block';
                document.getElementById('cgst-sgst-inputs').style.display = 'none';
            } else {
                document.getElementById('igst-input').style.display = 'none';
                document.getElementById('cgst-sgst-inputs').style.display = 'block';
            }
        }

        function addNewItemRow() {
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'item-row-input';
            newRow.innerHTML = `
                <input type="text" placeholder="Description" class="item-desc">
                <input type="number" placeholder="Qty." class="item-qty">
                <input type="text" placeholder="Unit" class="item-unit">
                <input type="number" step="0.01" placeholder="Rate" class="item-rate">
            `;
            container.appendChild(newRow);
        }

        function numberToWords(num) {
            if (!num || num === 0) return "";
            const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", 
                          "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
            const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

            function convertBelowThousand(n) {
                let res = "";
                if (n >= 100) {
                    res += ones[Math.floor(n / 100)] + " Hundred ";
                    n %= 100;
                }
                if (n >= 20) {
                    res += tens[Math.floor(n / 10)] + " ";
                    n %= 10;
                }
                if (n > 0) {
                    res += ones[n] + " ";
                }
                return res;
            }

            let result = "";
            if (num >= 100000) {
                result += convertBelowThousand(Math.floor(num / 100000)) + "Lakh ";
                num %= 100000;
            }
            if (num >= 1000) {
                result += convertBelowThousand(Math.floor(num / 1000)) + "Thousand ";
                num %= 1000;
            }
            result += convertBelowThousand(num);
            return result.trim() + " Rupees Only";
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            const rawYear = d.getFullYear().toString();
            const year = rawYear.length > 4 ? rawYear.slice(-4) : rawYear; 
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth()+1).padStart(2, '0')}-${year}`;
        }

        function generateAndPrint() {
            const rawBuyerGst = document.getElementById('buyer-gst').value.trim();

            const buyer = {
                name: document.getElementById('buyer-name').value,
                addr: document.getElementById('buyer-address').value,
                gst: rawBuyerGst ? (rawBuyerGst.toUpperCase().startsWith('GSTIN') ? rawBuyerGst : `GST No: ${rawBuyerGst}`) : ""
            };

            const meta = {
                serial: document.getElementById('serial-no').value,
                date: formatDate(document.getElementById('invoice-date').value),
                delivDate: formatDate(document.getElementById('delivery-date').value),
                challan: document.getElementById('challan-no').value
            };

            const itemRows = document.getElementsByClassName('item-row-input');
            let items = [];
            let totalBeforeTax = 0;

            for (let i = 0; i < itemRows.length; i++) {
                const inputs = itemRows[i].getElementsByTagName('input');
                const desc = inputs[0].value;
                const qty = parseInt(inputs[1].value) || 0;
                const unit = inputs[2].value;
                const rate = parseFloat(inputs[3].value) || 0;
                
                if (!desc && qty === 0 && rate === 0) continue;

                const amt = parseFloat((qty * rate).toFixed(2));
                totalBeforeTax += amt;

                items.push({
                    sl: items.length + 1,
                    desc: desc,
                    qty: qty || "",
                    unit: unit,
                    rate: rate ? rate.toFixed(2) : "",
                    amt: amt ? amt.toFixed(2) : ""
                });
            }

            const taxType = document.getElementById('tax-type').value;
            let taxHTML = "";
            let grandTotal = totalBeforeTax;

            if (taxType === "IGST") {
                const igstP = parseInt(document.getElementById('igst-percent').value) || 0;
                const igstAmt = parseFloat((totalBeforeTax * (igstP / 100)).toFixed(2));
                grandTotal += igstAmt;
                
                taxHTML = `
                    <tr>
                        <td class="col-1"></td>
                        <td class="right col-2">IGST ${igstP ? igstP + '%' : ''}</td>
                        <td class="col-3"></td>
                        <td class="col-4"></td>
                        <td class="col-5"></td>
                        <td class="right nowrap col-6">${igstAmt ? igstAmt.toFixed(2) : ''}</td>
                    </tr>
                `;
            } else {
                const sgstP = parseInt(document.getElementById('sgst-percent').value) || 0;
                const cgstP = parseInt(document.getElementById('cgst-percent').value) || 0;
                const sgstAmt = parseFloat((totalBeforeTax * (sgstP / 100)).toFixed(2));
                const cgstAmt = parseFloat((totalBeforeTax * (cgstP / 100)).toFixed(2));
                grandTotal += (cgstAmt + sgstAmt);
                
                taxHTML = `
                    <tr>
                        <td class="col-1"></td>
                        <td class="right col-2">SGST ${sgstP ? sgstP + '%' : ''}</td>
                        <td class="col-3"></td>
                        <td class="col-4"></td>
                        <td class="col-5"></td>
                        <td class="right nowrap col-6">${sgstAmt ? sgstAmt.toFixed(2) : ''}</td>
                    </tr>
                    <tr>
                        <td class="col-1"></td>
                        <td class="right col-2">CGST ${cgstP ? cgstP + '%' : ''}</td>
                        <td class="col-3"></td>
                        <td class="col-4"></td>
                        <td class="col-5"></td>
                        <td class="right nowrap col-6">${cgstAmt ? cgstAmt.toFixed(2) : ''}</td>
                    </tr>
                `;
            }

            grandTotal = Math.round(grandTotal);
            const totalWords = numberToWords(grandTotal);

            let tableHTML = `
                <!-- Party Info Section -->
                <tr>
                    <td class="col-span-4 party-cell">
                        <span class="sender-title">${SELLER_DETAILS.name}</span>
                        <span class="address-block">${SELLER_DETAILS.address}</span>
                        <span class="sender-gst-text seller-gst-bold">${SELLER_DETAILS.gstin}</span>
                    </td>
                    <td class="col-span-2 party-cell">
                        <span class="normal">Seri No.</span> ${meta.serial}<br><br><br>
                        <span class="normal">Date:</span> ${meta.date}
                    </td>
                </tr>
                <tr>
                    <td class="col-span-4 party-cell">
                        <span class="buyer-title">${buyer.name}</span>
                        <span class="address-block">${buyer.addr}</span>
                        <span class="buyer-gst-text">${buyer.gst}</span>
                    </td>
                    <td class="col-span-2 party-cell">
                        <span class="normal">Date of Delivery of Goods:</span><br>
                        ${meta.delivDate}<br><br>
                        <span class="normal">Delivery Challan No:</span> ${meta.challan}
                    </td>
                </tr>

                <!-- Column Headers -->
                <tr style="background-color: #f9f9f9;">
                    <th class="col-1">Sl.No.</th>
                    <th class="col-2">Description</th>
                    <th class="col-3">Qty.</th>
                    <th class="col-4">Unit</th>
                    <th class="col-5">Rate (Rs.)</th>
                    <th class="col-6">Amount (Rs.)</th>
                </tr>
            `;

            // Active Item Rows
            items.forEach(item => {
                tableHTML += `
                    <tr>
                        <td class="center col-1">${item.sl}</td>
                        <td class="col-2">${item.desc}</td>
                        <td class="center col-3">${item.qty}</td>
                        <td class="center col-4">${item.unit}</td>
                        <td class="right nowrap col-5">${item.rate}</td>
                        <td class="right nowrap col-6">${item.amt}</td>
                    </tr>
                `;
            });

            // Dynamic Spacer Row
            tableHTML += `
                <tr class="dynamic-spacer-row">
                    <td class="col-1"></td>
                    <td class="col-2"></td>
                    <td class="col-3"></td>
                    <td class="col-4"></td>
                    <td class="col-5"></td>
                    <td class="col-6"></td>
                </tr>
            `;

            // Financial Summary Section
            tableHTML += `
                <tr>
                    <td class="col-1"></td>
                    <td class="right col-2">Total Amount</td>
                    <td class="col-3"></td>
                    <td class="col-4"></td>
                    <td class="col-5"></td>
                    <td class="right nowrap col-6">${totalBeforeTax ? totalBeforeTax.toFixed(2) : ''}</td>
                </tr>
                ${taxHTML}
                <tr>
                    <td class="col-1"></td>
                    <td class="right col-2">GRAND TOTAL</td>
                    <td class="col-3"></td>
                    <td class="col-4"></td>
                    <td class="col-5"></td>
                    <td class="right nowrap col-6">${grandTotal ? grandTotal.toFixed(2) : ''}</td>
                </tr>
                <tr>
                    <td class="col-span-6" style="padding: 10px 12px;">
                        Rupees : ${totalWords}
                    </td>
                </tr>
                <!-- Signature Block -->
                <tr>
                    <td class="col-span-6" style="padding: 15px; height: 110px;">
                        <div class="signature-container">
                            <div>For ${SELLER_DETAILS.name}</div>
                            <div style="margin-top: 55px;">Authorized Signatory</div>
                        </div>
                    </td>
                </tr>
            `;

            document.getElementById('master-table').innerHTML = tableHTML;
            window.print();
        }
    </script>
</body>
</html>
